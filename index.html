<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SirK Cloud | Nowoczesny Outsourcing IT</title>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg-main: #04060a; --accent-cyan: #06b6d4; --text-main: #f8fafc; --text-muted: #94a3b8; }
        body { font-family: 'Epilogue', sans-serif; background-color: var(--bg-main); color: var(--text-main); line-height: 1.6; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        
        /* Layout */
        header { position: fixed; top: 0; width: 100%; background: rgba(4, 6, 10, 0.85); backdrop-filter: blur(10px); padding: 20px 0; z-index: 100; border-bottom: 1px solid #1e293b; }
        .hero { padding: 200px 0 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; }
        
        /* Terminal */
        .terminal { width: 100%; max-width: 500px; height: 350px; background: #020408; border: 1px solid #334155; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .term-header { padding: 15px; background: #0f172a; display: flex; gap: 8px; border-bottom: 1px solid #334155; position: sticky; top: 0; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .term-body { padding: 15px; font-family: 'Courier New', monospace; font-size: 13px; color: #38bdf8; overflow-y: auto; flex-grow: 1; }
        
        .row { margin-bottom: 5px; display: block; overflow-wrap: break-word; }
        .cursor { display: inline-block; width: 8px; height: 14px; background: #fff; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        input { position: absolute; opacity: 0; }
        
        @media (max-width: 900px) { .hero { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header><div class="container"><strong>SirK <span style="color:var(--accent-cyan)">Cloud</span></strong></div></header>

<main>
    <section class="hero"><div class="container">
        <div><h1>Nowoczesne IT dla Twojej firmy</h1></div>
        <div class="terminal" id="term">
            <div class="term-header"><div class="dot" style="background:#ef4444"></div><div class="dot" style="background:#eab308"></div><div class="dot" style="background:#22c55e"></div></div>
            <div class="term-body" id="body"></div>
            <input type="text" id="input">
        </div>
    </div></section>
</main>

<script>
    const body = document.getElementById('body');
    const input = document.getElementById('input');
    let locked = true;

    const print = (text, cls = '') => {
        const span = document.createElement('span');
        span.className = 'row ' + cls;
        span.innerHTML = text;
        body.appendChild(span);
        body.scrollTop = body.scrollHeight;
    };

    const init = async () => {
        // Mruganie kursora startowego
        const cursorRow = document.createElement('span');
        cursorRow.innerHTML = `root@sirk:~# <span class="cursor"></span>`;
        body.appendChild(cursorRow);
        await new Promise(r => setTimeout(r, 3200));
        cursorRow.remove();

        // Sekwencja animacji
        print('root@sirk:~# run sirk-business-support-core');
        await new Promise(r => setTimeout(r, 1000));
        print('<span style="color:#22c55e">[OK] System initialized</span>');
        await new Promise(r => setTimeout(r, 800));
        print('root@sirk:~# exit 0');
        await new Promise(r => setTimeout(r, 500));
        
        // Odblokowanie
        locked = false;
        print('root@sirk:~# <span class="input-line"></span><span class="cursor"></span>');
        input.focus();
    };

    document.getElementById('term').addEventListener('click', () => { if(!locked) input.focus(); });

    input.addEventListener('input', (e) => {
        if(locked) return;
        const line = body.querySelector('.input-line');
        if(line) line.textContent = e.target.value;
    });

    input.addEventListener('keydown', (e) => {
        if(locked) return;
        if(e.key === 'Enter') {
            const val = input.value.trim();
            if(val === 'clear' || val === 'exit') { body.innerHTML = ''; }
            else { print(`bash: ${val}: command not found`, 't-danger'); }
            
            print('root@sirk:~# <span class="input-line"></span><span class="cursor"></span>');
            input.value = '';
        }
    });

    init();
</script>
</body>
</html>
