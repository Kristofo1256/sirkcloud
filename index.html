<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SirK Cloud | Nowoczesny Outsourcing IT</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js" defer></script>

    <style>
        /* CSS Core Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-main: #04060a;
            --bg-surface: #0b111e;
            --bg-card: #111a2e;
            --accent-indigo: #4338ca;
            --accent-blue: #2563eb;
            --accent-cyan: #06b6d4;
            --accent-purple: #7c3aed;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --container-max: 1200px;
            --font-primary: 'Epilogue', sans-serif;
            --transition-linear: 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        html {
            font-family: var(--font-primary);
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        body {
            overflow-x: hidden;
            position: relative;
            background-color: var(--bg-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: var(--container-max);
            margin: 0 auto;
            padding: 0 24px;
        }

        .section {
            padding: 85px 0;
            position: relative;
            z-index: 2;
        }

        /* Tło Aurora & Grid */
        .aurora-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .aurora-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.28;
        }

        .aurora-1 { width: 650px; height: 650px; background: var(--accent-blue); top: -10%; right: -5%; }
        .aurora-2 { width: 550px; height: 550px; background: var(--accent-purple); bottom: 5%; left: -10%; }

        .tech-grid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(6, 182, 212, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(6, 182, 212, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Header / Menu */
        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background-color: rgba(4, 6, 10, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding: 14px 0;
        }

        .header-container { display: flex; justify-content: space-between; align-items: center; }
        .logo-container { display: flex; align-items: center; text-decoration: none; }
        .logo-img { height: 46px; width: auto; object-fit: contain; }
        .logo-fallback { font-weight: 800; font-size: 1.5rem; color: var(--text-main); }
        .accent-text { color: var(--accent-cyan); }

        .main-nav ul { display: flex; list-style: none; align-items: center; gap: 32px; }
        .nav-link { color: var(--text-muted); text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: color 0.3s; }
        .nav-link:hover { color: var(--text-main); }

        /* Przyciski */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            font-family: var(--font-primary);
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            transition: transform var(--transition-linear), background-color var(--transition-linear);
        }
        .btn-sm { padding: 8px 16px; font-size: 0.85rem; }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-indigo) 100%);
            color: #ffffff; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-primary:hover { transform: translateY(-2px); background: linear-gradient(135deg, var(--accent-blue) 30%, var(--accent-purple) 100%); }
        .btn-secondary { background-color: rgba(255, 255, 255, 0.03); color: var(--text-main); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-secondary:hover { background-color: rgba(255, 255, 255, 0.07); border-color: var(--accent-cyan); transform: translateY(-2px); }
        .btn-full { width: 100%; }

        /* Hero Sekcja */
        .hero-section { padding-top: 210px; padding-bottom: 110px; }
        .hero-container { display: grid; grid-template-columns: 1.10fr 0.90fr; gap: 50px; align-items: center; }
        .hero-title {
            font-size: 3.6rem; font-weight: 800; margin-bottom: 20px; line-height: 1.15;
            background: linear-gradient(135deg, #ffffff 40%, var(--accent-cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero-subtitle { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 36px; max-width: 600px; }
        .hero-meta { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
        .meta-item {
            display: flex; align-items: center; gap: 10px; color: var(--text-main); font-size: 0.95rem;
            background: rgba(17, 26, 46, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); padding: 8px 18px; border-radius: 20px;
        }
        .hero-actions { display: flex; gap: 16px; }

        /* --- INTERAKTYWNY TERMINAL --- */
        .hero-visual { display: flex; justify-content: center; align-items: center; position: relative; }
        .production-terminal {
            width: 100%; max-width: 480px; min-height: 330px; max-height: 330px;
            background: #020408; border: 1px solid rgba(6, 182, 212, 0.3); border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); padding: 22px;
            font-family: 'Courier New', Courier, monospace; font-size: 13px; color: #38bdf8;
            text-align: left; position: relative; cursor: text; overflow-y: auto;
        }

        .terminal-header { display: flex; gap: 6px; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 10px; }
        .term-dot { width: 10px; height: 10px; border-radius: 50%; }
        .term-dot.red { background: #ef4444; }
        .term-dot.yellow { background: #eab308; }
        .term-dot.green { background: #22c55e; }

        .log-output { display: flex; flex-direction: column; gap: 8px; }
        .term-row { display: block; line-height: 1.4; word-break: break-all; }

        .admin-input { color: #f1f5f9; font-weight: 500; }

        /* Ukryty input łapiący fizyczną klawiaturę */
        #terminalHiddenInput {
            position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0;
        }

        /* Mrugający kursor tekstowy */
        .term-cursor {
            display: inline-block; width: 8px; height: 15px; background-color: #f1f5f9;
            margin-left: 2px; vertical-align: middle; animation: blinkCursor 0.8s infinite steps(1);
        }
        @keyframes blinkCursor { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
        
        .t-bold { font-weight: bold; color: var(--text-main); }
        .t-success { color: #22c55e; font-weight: bold; }
        .t-warn { color: #eab308; }
        .t-danger { color: #ef4444; font-weight: bold; }

        /* Sekcja nagłówków dolnych */
        .section-header { margin-bottom: 44px; max-width: 700px; }
        .section-tag { display: inline-block; color: var(--accent-cyan); font-size: 0.75rem; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 12px; }
        .section-title { font-size: 2.4rem; font-weight: 700; }

        /* Siatki */
        .cards-grid { display: grid; gap: 24px; }
        .layout-3-col { grid-template-columns: repeat(3, 1fr); }
        .layout-2-col { grid-template-columns: repeat(2, 1fr); }

        /* Karty */
        .interactive-card {
            background-color: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.03); padding: 36px; border-radius: 8px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform var(--transition-linear), border-color var(--transition-linear);
        }
        .interactive-card:hover { transform: translateY(-5px); border-color: rgba(6, 182, 212, 0.3); }
        .card-icon { color: var(--accent-cyan); margin-bottom: 20px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: rgba(6, 182, 212, 0.05); border-radius: 6px; }
        .interactive-card h3 { font-size: 1.3rem; margin-bottom: 12px; }
        .interactive-card p { color: var(--text-muted); font-size: 0.95rem; }

        /* Filary "O Nas" */
        .filar-item { display: flex; gap: 24px; background: rgba(17, 26, 46, 0.4); border-left: 3px solid rgba(37, 99, 235, 0.3); padding: 28px; border-radius: 0 6px 6px 0; transition: border-left-color var(--transition-linear), background-color var(--transition-linear); }
        .filar-item:hover { border-left-color: var(--accent-cyan); background-color: rgba(17, 26, 46, 0.7); }
        .filar-number { font-size: 1.6rem; font-weight: 800; color: var(--accent-cyan); line-height: 1; }
        .filar-content h3 { font-size: 1.3rem; margin-bottom: 8px; }
        .filar-content p { color: var(--text-muted); font-size: 0.95rem; }

        /* Sekcja Kontakt */
        .contact-container { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 50px; align-items: center; }
        .contact-lead { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 32px; }
        .contact-details { display: flex; flex-direction: column; gap: 16px; }
        .contact-method { display: flex; align-items: center; gap: 20px; text-decoration: none; color: var(--text-main); padding: 16px; background: rgba(17, 26, 46, 0.3); border: 1px solid rgba(255, 255, 255, 0.02); border-radius: 6px; transition: border-color var(--transition-linear), background var(--transition-linear); }
        .contact-method:hover { border-color: rgba(6, 182, 212, 0.2); background: rgba(17, 26, 46, 0.6); }
        .method-icon { width: 44px; height: 44px; border-radius: 6px; background: rgba(6, 182, 212, 0.08); color: var(--accent-cyan); display: flex; align-items: center; justify-content: center; }
        .method-label { display: block; font-size: 0.8rem; color: var(--text-muted); }
        .method-value { font-weight: 700; font-size: 1.15rem; }
        .contact-cta-box { background: linear-gradient(145deg, var(--bg-surface) 0%, #152033 100%); border: 1px solid rgba(255, 255, 255, 0.04); padding: 44px; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .contact-cta-box h3 { font-size: 1.6rem; margin-bottom: 12px; }
        .contact-cta-box p { color: var(--text-muted); margin-bottom: 28px; font-size: 0.95rem; }

        /* Stopka */
        .main-footer { border-top: 1px solid rgba(255, 255, 255, 0.04); padding: 40px 0; background-color: #020305; position: relative; z-index: 2; }
        .footer-container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; color: var(--text-muted); font-size: 0.9rem; }

        /* System przejść scrolla */
        .scroll-animate-trigger { opacity: 0; transform: translateY(30px); transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); will-change: transform, opacity; }
        .scroll-animate-trigger.active { opacity: 1; transform: translateY(0); }
        .stagger-node { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; }
        .scroll-animate-trigger.active .stagger-node { opacity: 1; transform: translateY(0); }

        /* RWD */
        @media (max-width: 1024px) {
            .hero-container, .contact-container { grid-template-columns: 1fr; gap: 44px; }
            .hero-visual { order: -1; }
            .production-terminal { max-width: 100%; }
            .layout-3-col, .layout-2-col { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .main-nav { display: none; }
            .hero-actions { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="aurora-container" aria-hidden="true">
        <div class="tech-grid-overlay"></div>
        <div class="aurora-glow aurora-1"></div>
        <div class="aurora-glow aurora-2"></div>
    </div>

    <header class="main-header">
        <div class="container header-container">
            <a href="#" class="logo-container" aria-label="Strona główna Sirk Cloud">
                <img src="RGB_Sirk Cloud_Horizontal_White_www.png" alt="SirK Cloud Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <span class="logo-fallback" style="display:none;">SirK <span class="accent-text">Cloud</span></span>
            </a>
            <nav class="main-nav" aria-label="Nawigacja główna">
                <ul>
                    <li><a href="#oferta" class="nav-link">Oferta</a></li>
                    <li><a href="#dla-kogo" class="nav-link">Dla kogo</a></li>
                    <li><a href="#o-nas" class="nav-link">O nas</a></li>
                    <li><a href="#kontakt" class="btn btn-secondary btn-sm">Konsultacja</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero-section" id="oferta">
            <div class="container hero-container">
                <div class="hero-content">
                    <h1 class="hero-title">Kompleksowa opieka IT dla Twojej firmy</h1>
                    <p class="hero-subtitle">Pomagam firmom ogarniać IT w sposób prosty i zrozumiały. Bez straszenia technologią, bez niepotrzebnych komplikacji.</p>
                    
                    <div class="hero-meta" aria-label="Informacje o usłudze">
                        <div class="meta-item">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>
                            <span>Zdalna obsługa cała Polska</span>
                        </div>
                        <div class="meta-item">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="1" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                            <span>Od 250 zł miesięcznie</span>
                        </div>
                    </div>

                    <div class="hero-actions">
                        <a href="#dla-kogo" class="btn btn
